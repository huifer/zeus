<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="640" viewBox="0 0 1440 640" role="img" aria-labelledby="title desc">
  <title id="title">Zeus Workflow</title>
  <desc id="desc">Branded workflow from Init to Brainstorm to Plan to Execute to Feedback to Evolve with Status loop.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eef7f1"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0d1b2a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f4858"/>
    </marker>
    <style>
      .title { font: 700 34px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #102a43; }
      .subtitle { font: 500 16px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #486581; }
      .node-title { font: 700 18px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #1f2933; }
      .node-text { font: 500 13px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #52606d; }
      .loop { font: 700 14px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #0b6e4f; }
    </style>
  </defs>

  <rect x="0" y="0" width="1440" height="640" fill="url(#bg)"/>
  <text x="60" y="74" class="title">Zeus Lifecycle Workflow</text>
  <text x="60" y="105" class="subtitle">Design-first delivery with attribution-driven evolution</text>

  <g filter="url(#shadow)">
    <rect x="60" y="180" rx="18" ry="18" width="190" height="130" fill="url(#card)" stroke="#aac9ff"/>
    <text x="85" y="222" class="node-title">01 Init</text>
    <text x="85" y="248" class="node-text">Project baseline</text>
    <text x="85" y="267" class="node-text">North star metrics</text>

    <rect x="290" y="180" rx="18" ry="18" width="220" height="130" fill="url(#card)" stroke="#8fd0c6"/>
    <text x="315" y="222" class="node-title">02 Brainstorm</text>
    <text x="315" y="248" class="node-text">One-question loop</text>
    <text x="315" y="267" class="node-text">Approved design spec</text>

    <rect x="550" y="180" rx="18" ry="18" width="200" height="130" fill="url(#card)" stroke="#ffd29d"/>
    <text x="575" y="222" class="node-title">03 Plan</text>
    <text x="575" y="248" class="node-text">Spec -> Stories</text>
    <text x="575" y="267" class="node-text">Stories -> Tasks</text>

    <rect x="790" y="180" rx="18" ry="18" width="220" height="130" fill="url(#card)" stroke="#c8b6ff"/>
    <text x="815" y="222" class="node-title">04 Execute</text>
    <text x="815" y="248" class="node-text">Wave orchestration</text>
    <text x="815" y="267" class="node-text">Atomic commits</text>

    <rect x="1050" y="180" rx="18" ry="18" width="200" height="130" fill="url(#card)" stroke="#ffb3c1"/>
    <text x="1075" y="222" class="node-title">05 Feedback</text>
    <text x="1075" y="248" class="node-text">Attribution score</text>
    <text x="1075" y="267" class="node-text">Signal detection</text>

    <rect x="1290" y="180" rx="18" ry="18" width="130" height="130" fill="url(#card)" stroke="#96d39b"/>
    <text x="1310" y="222" class="node-title">06 Evolve</text>
    <text x="1310" y="248" class="node-text">Version split</text>
  </g>

  <line x1="250" y1="245" x2="290" y2="245" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="510" y1="245" x2="550" y2="245" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="750" y1="245" x2="790" y2="245" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1010" y1="245" x2="1050" y2="245" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1250" y1="245" x2="1290" y2="245" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>

  <path d="M1335 330 C1260 520, 420 520, 170 340" fill="none" stroke="#0b6e4f" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrow)"/>
  <text x="610" y="565" class="loop">Status Loop: /zeus:status monitors all versions and drives the next action.</text>
</svg>
